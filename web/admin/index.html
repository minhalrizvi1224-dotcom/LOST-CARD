<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LC Admin</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0D1117; --surface: #161B22; --surface2: #1C2128;
      --border:  #30363D; --text:    #E6EDF3; --muted:   #8B949E;
      --accent:  #58A6FF; --accent2: #F0883E;
      --green:   #56D364; --red:     #FF7B72; --purple:  #C678DD;
    }
    html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; }

    /* ── Auth screen ── */
    #authScreen {
      min-height:100dvh; display:flex; align-items:center; justify-content:center;
    }
    .auth-box {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:36px 32px; width:100%; max-width:380px;
    }
    .auth-title { font-size:18px; font-weight:800; margin-bottom:4px; }
    .auth-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .field input { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:13px; outline:none; }
    .field input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:11px; background:var(--accent); color:#0D1117; border:none; border-radius:7px; font-size:14px; font-weight:700; cursor:pointer; margin-top:4px; }
    .auth-err { color:var(--red); font-size:12px; margin-top:10px; display:none; }

    /* ── Dashboard ── */
    #dashboard { display:none; }
    .topbar {
      position:sticky; top:0; z-index:100;
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 24px; display:flex; align-items:center; gap:16px;
    }
    .topbar-logo { font-size:15px; font-weight:800; letter-spacing:2px; }
    .topbar-tag { background:var(--accent); color:#0D1117; font-size:10px; font-weight:800; padding:2px 7px; border-radius:4px; letter-spacing:1px; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
    .signout-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
    .signout-btn:hover { border-color:var(--red); color:var(--red); }

    .main { padding:24px; max-width:1200px; margin:0 auto; }

    /* ── Stat cards ── */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:28px; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:18px 20px;
    }
    .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .stat-value { font-size:28px; font-weight:800; }
    .stat-value.accent { color:var(--accent); }
    .stat-value.green  { color:var(--green); }
    .stat-value.orange { color:var(--accent2); }
    .stat-value.purple { color:var(--purple); }

    /* ── Section ── */
    .section-title { font-size:15px; font-weight:800; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }

    /* ── Table ── */
    .data-table { width:100%; border-collapse:collapse; margin-bottom:32px; }
    .data-table th { text-align:left; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:10px 12px; border-bottom:1px solid var(--border); }
    .data-table td { padding:10px 12px; border-bottom:1px solid rgba(48,54,61,.5); font-size:13px; vertical-align:top; }
    .data-table tr:hover td { background:rgba(255,255,255,.02); }
    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
    .badge-green  { background:rgba(86,211,100,.15); color:var(--green); }
    .badge-red    { background:rgba(255,123,114,.15); color:var(--red); }
    .badge-purple { background:rgba(198,120,221,.15); color:var(--purple); }
    .badge-blue   { background:rgba(88,166,255,.15);  color:var(--accent); }
    .badge-orange { background:rgba(240,136,62,.15);  color:var(--accent2); }

    /* ── Tabs ── */
    .tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); }
    .tab-btn { padding:9px 16px; background:none; border:none; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* ── Loading ── */
    .loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Empty state ── */
    .empty { text-align:center; padding:40px; color:var(--muted); }
    .empty-icon { font-size:36px; margin-bottom:10px; }

    /* ── Refresh btn ── */
    .refresh-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 14px; border-radius:7px; cursor:pointer; font-size:12px; font-weight:600; }
    .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-title">LC Admin</div>
    <div class="auth-sub">Restricted access. Authorised personnel only.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="adEmail" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="adPass" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()"/>
    </div>
    <button class="auth-btn" onclick="adminLogin()">Access Dashboard</button>
    <div class="auth-err" id="adErr"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <div class="topbar">
    <span class="topbar-logo">LOST CARD</span>
    <span class="topbar-tag">ADMIN</span>
    <div class="topbar-right">
      <span id="adminEmailLabel" style="font-size:12px;color:var(--muted)"></span>
      <button class="signout-btn" onclick="adminSignOut()">Sign Out</button>
    </div>
  </div>

  <div class="main">

    <!-- Stat cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value accent" id="statUsers">-</div></div>
      <div class="stat-card"><div class="stat-label">Total Sessions</div><div class="stat-value green" id="statSessions">-</div></div>
      <div class="stat-card"><div class="stat-label">Avg Health Score</div><div class="stat-value orange" id="statAvgHealth">-</div></div>
      <div class="stat-card"><div class="stat-label">Cards Lost (avg)</div><div class="stat-value purple" id="statAvgCards">-</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchAdminTab('users')">Users</button>
      <button class="tab-btn" onclick="switchAdminTab('sessions')">Sessions</button>
    </div>

    <!-- Users tab -->
    <div id="tabUsers">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0;border:none">All Users</div>
        <button class="refresh-btn" onclick="loadUsers()">Refresh</button>
      </div>
      <div id="usersTable"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    </div>

    <!-- Sessions tab -->
    <div id="tabSessions" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0;border:none">Recent Sessions</div>
        <button class="refresh-btn" onclick="loadSessions()">Refresh</button>
      </div>
      <div id="sessionsTable"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>

<script>
'use strict';

let adAuth = null, adDB = null, adUser = null;

// ── Init ───────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!FIREBASE_ENABLED) {
    document.getElementById('adErr').textContent = 'Firebase not configured.';
    document.getElementById('adErr').style.display = 'block';
    return;
  }
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  adAuth = firebase.auth();
  adDB   = firebase.firestore();

  adAuth.onAuthStateChanged(async user => {
    if (!user) { showAuthScreen(); return; }
    if (!IS_ADMIN(user.uid)) {
      await adAuth.signOut();
      showErr('Access denied. Not an admin account.');
      return;
    }
    adUser = user;
    showDashboard();
  });
});

// ── Login ──────────────────────────────────────────────────────────────
async function adminLogin() {
  const email = document.getElementById('adEmail').value.trim();
  const pass  = document.getElementById('adPass').value;
  hideErr();
  if (!email || !pass) { showErr('Enter email and password.'); return; }
  try {
    await adAuth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showErr('Invalid credentials.');
  }
}

async function adminSignOut() {
  await adAuth.signOut();
  showAuthScreen();
}

function showAuthScreen() {
  document.getElementById('authScreen').style.display  = 'flex';
  document.getElementById('dashboard').style.display   = 'none';
}

function showDashboard() {
  document.getElementById('authScreen').style.display  = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  document.getElementById('adminEmailLabel').textContent = adUser.email;
  loadStats();
  loadUsers();
}

// ── Stats ──────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const [usersSnap, sessionsSnap] = await Promise.all([
      adDB.collection('users').get(),
      adDB.collection('sessions').orderBy('timestamp','desc').limit(200).get()
    ]);

    document.getElementById('statUsers').textContent    = usersSnap.size;
    document.getElementById('statSessions').textContent = sessionsSnap.size;

    if (sessionsSnap.size > 0) {
      let totalHealth = 0, totalCards = 0, count = 0;
      sessionsSnap.forEach(d => {
        const s = d.data();
        if (s.healthScore) { totalHealth += s.healthScore; count++; }
        totalCards += (s.cardsLostCount || 0);
      });
      document.getElementById('statAvgHealth').textContent = count > 0 ? Math.round(totalHealth/count) : '-';
      document.getElementById('statAvgCards').textContent  = (totalCards/sessionsSnap.size).toFixed(1);
    }
  } catch(e) { console.warn('Stats error:', e); }
}

// ── Users table ────────────────────────────────────────────────────────
async function loadUsers() {
  const el = document.getElementById('usersTable');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';
  try {
    const snap = await adDB.collection('users').orderBy('createdAt','desc').get();
    if (snap.empty) { el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>No users yet.</div>'; return; }

    let html = `<table class="data-table">
      <thead><tr>
        <th>Name</th><th>Email</th><th>Sessions</th>
        <th>Archetype</th><th>Platform</th><th>Joined</th>
      </tr></thead><tbody>`;

    snap.forEach(d => {
      const u   = d.data();
      const dt  = u.createdAt ? new Date(u.createdAt.seconds*1000).toLocaleDateString() : '-';
      const arch= u.archetype || '-';
      const plat= u.platform  || '-';
      html += `<tr>
        <td style="font-weight:600">${esc(u.displayName||'-')}</td>
        <td style="color:var(--muted)">${esc(u.email||'-')}</td>
        <td><span class="badge badge-blue">${u.totalSessions||0}</span></td>
        <td style="font-size:12px;color:var(--purple)">${esc(arch)}</td>
        <td><span class="badge ${plat==='mobile'?'badge-green':'badge-blue'}">${esc(plat)}</span></td>
        <td style="color:var(--muted);font-size:12px">${dt}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

// ── Sessions table ─────────────────────────────────────────────────────
async function loadSessions() {
  const el = document.getElementById('sessionsTable');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';
  try {
    const snap = await adDB.collection('sessions').orderBy('timestamp','desc').limit(100).get();
    if (snap.empty) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>No sessions yet.</div>'; return; }

    let html = `<table class="data-table">
      <thead><tr>
        <th>User</th><th>Chat Type</th><th>Moves</th><th>Cards Lost</th>
        <th>Health</th><th>Archetype</th><th>End</th><th>Date</th>
      </tr></thead><tbody>`;

    snap.forEach(d => {
      const s  = d.data();
      const dt = s.timestamp ? new Date(s.timestamp.seconds*1000).toLocaleString() : '-';
      const cardsLostCount = s.cardsLostCount || 0;
      const cardBadge = cardsLostCount === 0 ? 'badge-green' : cardsLostCount === 1 ? 'badge-orange' : cardsLostCount >= 2 ? 'badge-red' : 'badge-blue';
      const endBadge  = s.endReason === 'completed' ? 'badge-green' : 'badge-red';

      html += `<tr>
        <td style="font-weight:600;font-size:12px">${esc(s.displayName||s.email||'Guest')}</td>
        <td style="font-size:12px;color:var(--muted)">${esc(s.chatType||'-')}</td>
        <td>${s.totalMoves||0}</td>
        <td><span class="badge ${cardBadge}">${cardsLostCount}/3</span></td>
        <td><span class="badge ${(s.healthScore||0)>=70?'badge-green':(s.healthScore||0)>=40?'badge-orange':'badge-red'}">${s.healthScore||'-'}${s.letterGrade?(' '+s.letterGrade):''}</span></td>
        <td style="font-size:11px;color:var(--purple)">${esc(s.archetype||'-')}</td>
        <td><span class="badge ${endBadge}">${esc(s.endReason||'-')}</span></td>
        <td style="color:var(--muted);font-size:11px">${dt}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

// ── Tab switch ─────────────────────────────────────────────────────────
function switchAdminTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='users')||(i===1&&tab==='sessions'));
  });
  document.getElementById('tabUsers').style.display    = tab==='users'    ? '' : 'none';
  document.getElementById('tabSessions').style.display = tab==='sessions' ? '' : 'none';
  if (tab === 'sessions') loadSessions();
}

// ── Helpers ────────────────────────────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('adErr');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('adErr').style.display = 'none'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
